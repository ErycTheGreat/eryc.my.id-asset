<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8">
	<meta name="googlebot" content="noindex,indexifembedded" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link rel="preload" href="https://www.eryc.my.id/assets/font/jetbrains-mono-600.woff2" as="font" type="font/woff2" fetchpriority="high" crossorigin>
    <style>
    
    /* Define your custom local font */
    @font-face {
        font-family: 'JetBrains Mono Local';
        font-style: normal;
        font-weight: 600; /* Matches your 600 weight */
        font-display: swap; 
        /* 2. Point this to your actual GitHub Pages URL */
        src: url('https://www.eryc.my.id/assets/font/jetbrains-mono-600.woff2') format('woff2');
    }
    
        body {
            margin: 0;
            padding: 0;
            overflow: hidden; /* Hide scrollbars for the entire page */
        }

        .container {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2rem;
            overflow: hidden;
        }

        /* Replaced .fa with .svg-icon */
        .svg-icon {
            width: 2.6rem;
            height: 2.6rem;
            color: #00bba9;
            margin-right: 30px;
        }

        .text {
            font-family: 'JetBrains Mono Local', monospace;
            font-size: 2.8rem;
            font-weight: 800;
            color: #f9f9f9;
            margin: 0;
            padding: 0;
            
            font-display: swap;
        }

        .icon-text {
            display: flex;
            align-items: center;
        }
        
        /* Blinking cursor effect */
        .blinking-cursor {
            display: inline-block;
            width: 24px;
            height: 0.14em;
            background-color: #f1f5f9;
            animation: blink 1s infinite;
            vertical-align: text-bottom;            
        }
            
        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            50.1%, 100% {
                opacity: 0;
            }
        }

        @media (max-width: 480px) {
            .title {
                flex-direction: column;
                font-size: 2.1rem;
                overflow: hidden;
            }

            /* Replaced .fa with .svg-icon */
            .svg-icon {
                width: 1.9rem;
                height: 1.9rem;
                margin-right: 20px;
            }

            .text {
                font-size: 2.1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <div class="icon-text">
                <svg class="svg-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <h1 class="text" itemprop="headline">SΞΘ<span class="blinking-cursor"></span></h1>
            </div>
        </div>
    </div>
</body>
</html>
