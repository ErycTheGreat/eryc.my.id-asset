	   .container {
	position: relative; /* REQUIRED */

	width: 95vw;

	box-shadow: none; /* optional: cleaner */
	border: none; /* remove default border */
	overflow: hidden; /* prevents overflow artifacts */
	}

	/* Cyberpunk Border Layer */
	.container::before {
	content: '';
	position: absolute;
	inset: 0;
	clip-path: polygon(
	0 3%, 
	3% 0, 
	97% 0, 
	97% 22%, 
	100% 25%, 
	100% 48%, 
	97% 51%, 
	97% 97%, 
	46% 97%, 
	43% 100%, 
	0 100%
	);
	background: linear-gradient(135deg, #00bba9, #4386c3); /* border color */
	z-index: -2;
	}

	/* Inner Mask Layer */
	.container::after {
	content: '';
	position: absolute;
	inset: 2px; /* controls border thickness */
	clip-path: polygon(
	0 3%, 
	3% 0, 
	97% 0, 
	97% 22%, 
	100% 25%, 
	100% 48%, 
	97% 51%, 
	97% 97%, 
	46% 97%, 
	43% 100%, 
	0 100%
	);
	background-color: #050522; /* inside background */
	z-index: -1;
	}

	   .tier-selector {
	       display: flex;
	       flex-direction: row;
	       gap: 1em;
	       margin-bottom: 1.5em;
	       justify-content: space-between;
	   }

	   .tier-option {
	       display: flex;
	       flex-direction: column;

	       padding: 0.5em;

	       flex: 1;
	       text-align: center;

	   /* SPLIT ARC CYBER RING */

	/* === POWERED SPLIT ARC CYBER RING === */

	.tier-option input[type="radio"] {
	appearance: none;
	-webkit-appearance: none;

	margin: 0;
	width: 24px;
	height: 24px;

	border-radius: 50%;
	cursor: pointer;
	position: relative;
	transition: all 0.3s ease;

	/* Stronger diagonal half split */
	background:
	conic-gradient(
	from -45deg,
	#00f5d4 0deg,
	#4386c3 180deg,
	transparent 180deg 360deg
	);

	/* Thicker ring */
	-webkit-mask:
	radial-gradient(circle at center, transparent 55%, black 56%);
	mask:
	radial-gradient(circle at center, transparent 55%, black 56%);

	/* Subtle idle glow */
	box-shadow:
	0 0 6px rgba(0,187,169,0.5);
	}


	/* === CHECKED STATE === */

	.tier-option input[type="radio"]:checked {

	background:
	conic-gradient(
	from -45deg,
	#00f5d4,
	#4386c3,
	#1bc7fb,
	#00f5d4
	);

	-webkit-mask:
	radial-gradient(circle at center, transparent 55%, black 56%);
	mask:
	radial-gradient(circle at center, transparent 55%, black 56%);

	/* MUCH stronger glow */
	box-shadow:
	0 0 10px #00f5d4,
	0 0 20px #4386c3,
	0 0 35px #1bc7fb,
	0 0 60px rgba(234,179,8,0.5);

	animation: rotateRing 1.8s linear infinite;
	}


	/* === Inner Shine === */

	.tier-option input[type="radio"]::before {
	content: "";
	position: absolute;
	inset: 0;
	border-radius: 50%;
	pointer-events: none;

	background: radial-gradient(
	circle at 30% 30%,
	rgba(255,255,255,0.9),
	transparent 35%
	);

	opacity: 0;
	transition: opacity 0.3s ease;
	}

	.tier-option input[type="radio"]:checked::before {
	opacity: 0.6;
	}


	/* === Rotation === */

	@keyframes rotateRing {
	from { transform: rotate(0deg); }
	to { transform: rotate(360deg); }
	}
