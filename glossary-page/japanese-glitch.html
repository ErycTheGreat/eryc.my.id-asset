<head>
	<meta charset="UTF-8">

	<meta content="width=device-width, initial-scale=1.0" name="viewport">
	<link href="https://fonts.googleapis.com" rel="preconnect">

	<link href="https://ErycTheGreat.github.io/eryc.my.id-asset/font/jetbrains-mono-300.woff2" rel="preload" type="font/woff2">
	<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700&text=体得&display=swap" rel="stylesheet">
	<style>
	       body {
	           margin: 0;
	           padding: 0;
	           overflow: hidden; /* Hide scrollbars for the entire page */
	           width: 100vw;  /* Force body to full width */
	           height: 100vh; /* Force body to full height */
	           
	       }

	       .container {
	           width: 100%; /* Forces the container to fill the iframe's width */
	           height: 100%; /* Forces the container to fill the iframe's height */
	           display: flex;
	           align-items: center;
	           justify-content: center;
	           flex-direction: column; /* Center vertically on smaller screens */
	           margin: 0;
	           padding: 0;
	           
	       }

	       .ascii-art {
	           font-family: 'Noto Sans JP', sans-serif;
	           font-size: clamp(60px, 28vw, 160px); /* Responsive font size based on viewport width */
	           line-height: 1; /* Prevent stretching */
	           /*animation: flicker linear infinite 2s 1s;*/
	           
	           -webkit-text-size-adjust: 100%;
	           text-rendering: geometricPrecision;
	           image-rendering: pixelated;
	       }

	       .no-margin {
	           margin: 5vh 0; /* Remove the bottom margin */
	           
	           /* GRADIENT SETTINGS */
	           background: linear-gradient(90deg, #4386c3, #f1f5f9, #e73c5d); /* A cyberpunk palette */
	           background-clip: text;
	           -webkit-background-clip: text;
	           color: transparent; 
	           -webkit-text-fill-color: transparent;
	           
	           filter: brightness(1); /* 1.0 is default. 1.3 is 30% brighter */
	       }
	           /*  Define your custom local font */
	       @font-face {
	               font-family: 'JetBrains Mono Local';
	               font-style: normal;
	               font-weight: 300; /* Matches your 600 weight */
	               font-display: swap; 
	               /* 2. Point this to your actual GitHub Pages URL */
	               src: url('https://ErycTheGreat.github.io/eryc.my.id-asset/font/jetbrains-mono-300.woff2') format('woff2');
	           }
	       .first-line {
	           font-family: 'JetBrains Mono Local', monospace;
	           font-size: clamp(14px, 4.5vw, 22px); /* Responsive font size based on viewport width */
	           font-weight: 300;
	           color: #f1f5f9;
	           margin: 0;
	           padding: 0;
	           letter-spacing: 0.5vw; /* Responsive letter spacing based on viewport width */
	           line-height: 1.6;
	           
	           opacity: 0.7;
	           letter-spacing: 0.2em;
	           
	            /* glitch RGB shadow */
	           text-shadow:
	           2px 0 #ff003c,
	           -2px 0 #00e5ff;
	           
	       }
	       
	       
	       /* =========================================
	          GLITCH EFFECT CSS START
	          ========================================= */
	       .layers {
	         position: relative;
	       }

	       .layers::before,
	       .layers::after {
	         content: attr(data-text);
	         position: absolute;
	         width: 100%;
	         z-index: -1;
	         white-space: pre; /* Keeps the ASCII formatting intact */
	         
	        -webkit-text-fill-color: initial; /* CRITICAL: Resets fill so glitch colors show */
	       }

	      .layers::before {
	         top: 0px;
	         left: 4px; /* Slightly wider split for deeper glitch */
	         color: #ff003c; /* Much brighter neon pink/red */
	         -webkit-text-fill-color: #ff003c; /* Forces color over the transparent gradient */
	         text-shadow: -1px 0px #ff003c; /* Adds a neon glow */
	         
	         /*mix-blend-mode: screen;*/
	       }

	       .layers::after {
	         top: 0px;
	         left: -4px;
	         color: #00e5ff; /* Much brighter neon cyan */
	         -webkit-text-fill-color: #00e5ff;
	         text-shadow: 1px 0px #00e5ff;
	         
	         /*mix-blend-mode: screen;*/
	       }

	       .paths {
	         animation: paths 4s step-end infinite;
	       }

	       @keyframes paths {
	         0% { clip-path: polygon( 0% 43%, 83% 43%, 83% 22%, 23% 22%, 23% 24%, 91% 24%, 91% 26%, 18% 26%, 18% 83%, 29% 83%, 29% 17%, 41% 17%, 41% 39%, 18% 39%, 18% 82%, 54% 82%, 54% 88%, 19% 88%, 19% 4%, 39% 4%, 39% 14%, 76% 14%, 76% 52%, 23% 52%, 23% 35%, 19% 35%, 19% 8%, 36% 8%, 36% 31%, 73% 31%, 73% 16%, 1% 16%, 1% 56%, 50% 56%, 50% 8% ); }
	         5% { clip-path: polygon( 0% 29%, 44% 29%, 44% 83%, 94% 83%, 94% 56%, 11% 56%, 11% 64%, 94% 64%, 94% 70%, 88% 70%, 88% 32%, 18% 32%, 18% 96%, 10% 96%, 10% 62%, 9% 62%, 9% 84%, 68% 84%, 68% 50%, 52% 50%, 52% 55%, 35% 55%, 35% 87%, 25% 87%, 25% 39%, 15% 39%, 15% 88%, 52% 88% ); }
	         30% { clip-path: polygon( 0% 53%, 93% 53%, 93% 62%, 68% 62%, 68% 37%, 97% 37%, 97% 89%, 13% 89%, 13% 45%, 51% 45%, 51% 88%, 17% 88%, 17% 54%, 81% 54%, 81% 75%, 79% 75%, 79% 76%, 38% 76%, 38% 28%, 61% 28%, 61% 12%, 55% 12%, 55% 62%, 68% 62%, 68% 51%, 0% 51%, 0% 92%, 63% 92%, 63% 4%, 65% 4% ); }
	         45% { clip-path: polygon( 0% 33%, 2% 33%, 2% 69%, 58% 69%, 58% 94%, 55% 94%, 55% 25%, 33% 25%, 33% 85%, 16% 85%, 16% 19%, 5% 19%, 5% 20%, 79% 20%, 79% 96%, 93% 96%, 93% 50%, 5% 50%, 5% 74%, 55% 74%, 55% 57%, 96% 57%, 96% 59%, 87% 59%, 87% 65%, 82% 65%, 82% 39%, 63% 39%, 63% 92%, 4% 92%, 4% 36%, 24% 36%, 24% 70%, 1% 70%, 1% 43%, 15% 43%, 15% 28%, 23% 28%, 23% 71%, 90% 71%, 90% 86%, 97% 86%, 97% 1%, 60% 1%, 60% 67%, 71% 67%, 71% 91%, 17% 91%, 17% 14%, 39% 14%, 39% 30%, 58% 30%, 58% 11%, 52% 11%, 52% 83%, 68% 83% ); }
	         76% { clip-path: polygon( 0% 26%, 15% 26%, 15% 73%, 72% 73%, 72% 70%, 77% 70%, 77% 75%, 8% 75%, 8% 42%, 4% 42%, 4% 61%, 17% 61%, 17% 12%, 26% 12%, 26% 63%, 73% 63%, 73% 43%, 90% 43%, 90% 67%, 50% 67%, 50% 41%, 42% 41%, 42% 46%, 50% 46%, 50% 84%, 96% 84%, 96% 78%, 49% 78%, 49% 25%, 63% 25%, 63% 14% ); }
	         90% { clip-path: polygon( 0% 41%, 13% 41%, 13% 6%, 87% 6%, 87% 93%, 10% 93%, 10% 13%, 89% 13%, 89% 6%, 3% 6%, 3% 8%, 16% 8%, 16% 79%, 0% 79%, 0% 99%, 92% 99%, 92% 90%, 5% 90%, 5% 60%, 0% 60%, 0% 48%, 89% 48%, 89% 13%, 80% 13%, 80% 43%, 95% 43%, 95% 19%, 80% 19%, 80% 85%, 38% 85%, 38% 62% ); }
	         1%, 7%, 33%, 47%, 78%, 93% { clip-path: none; }
	       }

	       .movement {
	         position: relative;
	         animation: movement 8s step-end infinite;
	       }

	       @keyframes movement {
	         /* Default state: Clean, perfectly aligned */
	         0%   { top: 0px; left: 0px; }

	         /* BURST 1: Rapid horizontal tear */
	         10%  { top: 0px; left: -12px; }
	         12%  { top: 0px; left: 12px; }
	         14%  { top: 0px; left: -6px; }
	         16%  { top: 0px; left: 0px; } /* Snap back to clean */

	         /* BURST 2: Huge split */
	         45%  { top: 1px; left: 16px; }
	         47%  { top: -1px; left: -16px; }
	         49%  { top: 0px; left: 0px; } /* Snap back to clean */

	         /* BURST 3: Quick micro-flicker */
	         73%  { top: 0px; left: -8px; }
	         75%  { top: 0px; left: 8px; }
	         77%  { top: 0px; left: 0px; } /* Snap back to clean */

	         /* BURST 4: Maximum violent tear */
	         88%  { top: 0px; left: -20px; }
	         90%  { top: 0px; left: 20px; }
	         92%  { top: 0px; left: -10px; }
	         94%  { top: 0px; left: 0px; } /* Snap back to clean */

	         100% { top: 0px; left: 0px; }
	       }

	       .opacity {
	         animation: opacity 5s step-end infinite;
	       }

	       @keyframes opacity {
	         0% { opacity: 0.1; }
	         5% { opacity: 0.7; }
	         30% { opacity: 0.4; }
	         45% { opacity: 0.6; }
	         76% { opacity: 0.4; }
	         90% { opacity: 0.8; }
	         1%, 7%, 33%, 47%, 78%, 93% { opacity: 0; }
	       }

	       .font {
	         animation: font 7s step-end infinite;
	       }

	       @keyframes font {
	         /* Removed font-weight changes to protect ASCII connections */
	           0% { color: #05d9e8; filter: blur(3px); }
	           20% { color: #ffffff; filter: blur(0); }
	           50% { color: #ff2a6d; filter: blur(2px); }
	           60% { color: #ffffff; filter: blur(0); }
	           90% { color: #00f5ff; filter: blur(6px); }
	       }

	       .glitch::before {
	         animation: paths 4s step-end infinite, opacity 5s step-end infinite,
	           font 8s step-end infinite, movement 10s step-end infinite;
	       }

	       .glitch::after {
	         animation: paths 5s step-end infinite, opacity 5s step-end infinite,
	           font 7s step-end infinite, movement 8s step-end infinite;
	       }
	       /* =========================================
	          GLITCH EFFECT CSS END
	          ========================================= */

	      @media screen and (max-width: 420px) {
	          
	      .ascii-art {
	           font-size: clamp(60px, 28vw, 600px);
	         
	           /*line-height: 1; /* Prevent stretching */
	           line-height: 1;
	           
	           -webkit-font-smoothing: none; 
	           font-smooth: never;
	           
	       }
	       .no-margin {
	           margin: 8vh 0; /* Remove the bottom margin */
	           }
	           
	           .first-line {
	               font-size: clamp(14px, 4.5vw, 22px);
	           }
	       
	          
	       }
	      
	</style>
</head>

			</div>
