	               ::-webkit-scrollbar-track {
	                 box-shadow: inset 0 0 0px rgba(0, 0, 0, 0.3);
	                 -webkit-box-shadow: inset 0 0 0px rgba(0, 0, 0, 0.3);

	               ::-webkit-scrollbar {

	               }

	               body {
	                 background-color: #050522;
	                 height: 92vh;
	                 padding: 0;
	                 margin: 0;
	                 font-family: 'JetBrains Mono local', monospace;
	                 display: flex;
	                 align-items: center;
	                 justify-content: center;
	               }

	               .container {
	         position: relative; /* Required for pseudo-elements */
	         display: flex;
	         flex-direction: column;
	         width: 100%;
	         max-width: 500px;
	         height: 100%;
	         overflow: hidden;
	         /*border-radius: 6px;*/
	         cursor: text;
	         background-color: transparent; /* Make the terminal background transparent */
	         z-index: 1; /* Ensure the terminal content is above the pseudo-elements */
	       }

	       /* ::before for the "border" */
	       .container::before {
	         content: '';
	         position: absolute;
	         top: 0;
	         left: 0;
	         width: 100%;
	         height: 100%;
	         clip-path: polygon(0 3%, 3% 0, 97% 0, 97% 22%, 100% 25%, 100% 48%, 97% 51%, 97% 97%, 46% 97%, 43% 100%, 0 100%);
	         background-color: #05122d; /* Border color */
	         z-index: -1; /* Place it behind the terminal content */
	       }

	       /* ::after for the "mask" */
	       .container::after {
	         content: '';
	         position: absolute;
	         top: 2px; /* Adjust to control border thickness */
	         left: 2px; /* Adjust to control border thickness */
	         width: calc(100% - 4px); /* Adjust to control border thickness */
	         height: calc(100% - 4px); /* Adjust to control border thickness */
	         clip-path: polygon(0 3%, 3% 0, 97% 0, 97% 22%, 100% 25%, 100% 48%, 97% 51%, 97% 97%, 46% 97%, 43% 100%, 0 100%);
	         background-color: #050522; /* Terminal background color */
	         z-index: -1; /* Place it above the ::before element */
	         
	       }

	               .menu {
	                 margin-top:1px;
	                 margin-left:1px;
	                 display: flex;
	                 align-items: center;
	                 text-align: center;
	                 flex-direction: row;
	                 width: 96.5%;
	                 height: 24px;
	                 background-color: #05122d;
	                 padding: 0 2%; /* Adjust the padding percentage as needed */
	                 cursor: default;
	                 clip-path: polygon(100% 0%, 100% 68%, 100% 100%, 0 100%, 0% 41%, 3% 0);
	               }

	               .menu .button {
	                 width: 12px; /* Adjust the width to make the buttons visible */
	                 height: 12px; /* Adjust the height to make the buttons visible */
	                 border-radius: 50%;
	                 margin-right: 8px; /* Adjust the margin to separate the buttons */
	                 cursor: pointer;
	               }

	               .red {
	                 background-color: #1e0525;
	               }
	               .yellow {

	               }
	               .green {
	                 background-color: #041d18;
	               }

	               div.title {
	                 flex: 1;
	                 text-align: center;
					 
	               }

	               .menu h1 {
	                 font-size: 3.7vw; /* Use viewport width (vw) for font size */
	                 color: #00bba9;
					 letter-spacing: 1px;
					 font-weight:normal;
	               }

	               .buttons-flex {
	                 position: absolute;
	                 display: flex;
	                 flex-direction: row;
	               }
	               
	   /* --- BLOCK CURSOR CSS ADDITIONS --- */
	   .input-container {
	       position: relative;
	       width: 100%;
	       display: flex;
	       align-items: center;
	       overflow: hidden;
	   }

	   .input-mirror-wrapper {
	       position: absolute;
	       left: 0;
	       display: flex;
	       align-items: center;
	       pointer-events: none; /* Let clicks pass through to the invisible real input */
	       color: rgb(247, 252, 160); /* Matches your yellow input text */
	       font-size: 4vw;
	       font-family: 'JetBrains Mono local', monospace;
	       white-space: pre; /* Keeps spacing accurate */
	   }

	   /* The new ::after cursor */
	   .text-before-cursor::after {
	       content: "";
	       display: inline-block;
	       width: 0.45em; 
	       height: 1.2em; 
	       background-color: #00bba9; 
	       
	       /* --- The Alignment Fix --- */
	       vertical-align: middle; 
	       transform: translateY(-0.1em); /* Nudges it up perfectly! */
	       /* ------------------------- */
	       
	       animation: blink 1s step-end infinite;
	       box-shadow: 0 0 5px rgba(0, 187, 169, 0.4); 
	   }

	   @keyframes blink {
	       0%, 100% { opacity: 1; }
	       50% { opacity: 0; }
	   }

	   /* Override the native input to make the text and native caret invisible */
	   input {
	       color: transparent !important; 
	       caret-color: transparent !important; 
	       z-index: 2; /* Keeps it on top so you can still click and type */
	       padding-right: 0.6em;
	   }
	   input::selection {
	       background: rgba(0, 187, 169, 0.3); /* Keeps text highlighting visible */
	       color: transparent;
	   }
	   /* --- END BLOCK CURSOR CSS --- */
	   
	   .ghost-suggestion {
	       position: absolute;
	       left: 0;
	       color: #00bba9;
	       opacity: 0.35; 
	       pointer-events: none; 
	       white-space: pre;
	       z-index: 0;
	       font-size: 4vw; /* Matches your custom input size */
	       font-family: 'JetBrains Mono local', monospace;
	   }
	               
	               #matrixCanvas {
	               position: fixed;
	               top: 0;
	               left: 0;
	               width: 100%;
	               height: 92vh;
	               z-index: 2;
	               display: none;
	               /*border-radius: 6px;*/
	           }
	           
	.spinner {
	   position: relative;
	   
	   /* 1. This aligns the entire line perfectly with your ">" commands below! */
	   margin-left: 2%; 
	   
	   /* 2. This controls the gap between the "|" and the "ERYC-OS" text */
	   padding-left: 1.2em; 
	}

	.spinner::before {
	   content: '|'; 
	   position: absolute;
	   
	   /* 3. Locks the spinner to the exact start of the paragraph's edge */
	   left: 0; 
	   top: 5.5px; 
	   
	   color: #cbd5e1;
	   transform: translateZ(0); 
	   -webkit-font-smoothing: antialiased;
	   animation: perfect-pipe 0.6s infinite steps(1); 
	}

	@keyframes perfect-pipe {
	   0%   { content: '|'; }
	   25%  { content: '/'; }
	   50%  { content: '-'; }
	   75%  { content: '\\'; }
	   100% { content: '|'; }
	}

	     p.code {
	     display: grid;
	     grid-template-columns: 100px 1fr; /* 100px width for the command column, 1fr takes the rest */
	     gap: 5px; /* Space between command and definition */
	     margin-left: 2%;
	     align-items: start; /* Keeps text at the top if the definition wraps to a second line */
	   }

	   }

	               p.path {

	               .sucess {

	               input {
	                 border: none;
	                 background-color: unset;
	                 color: rgb(247, 252, 160);
	                 width: 100%;
	                 font-size: 4vw; /* Use viewport width (vw) for font size */
	                 font-family: 'JetBrains Mono local', monospace;
	               }

	               input:focus {
	                 border: none; 
	                 outline: none;
	                 box-shadow: none;
	                 background-color: unset;
	               }

	               .type {
	                 display: flex;
	                 align-items: center;
	                 padding: 2% 0; /* Adjust the padding percentage as needed */
	               }

	               .type2 {
	                 display: flex;
	                 align-items: center;
	                 padding: 2% 0; /* Adjust the padding percentage as needed */
	               }

	               .icone {
	                 color: #00bba9;
	                 padding-right: 2%;
	               }

	               .icone.error {
	                 color: #e73c5d;
	               }
	               
	               .scan-grid {
	                   display: grid;
	                   grid-template-columns: 8ch 1fr; /* Col 1 is exactly 14 characters wide, Col 2 takes the rest */
	                   align-items: start; /* Keeps the label at the top even if the right side wraps to 3 lines */
	                   width: 100%;
	               }

	               .scan-label {
	                   white-space: pre; /* Forces the browser to respect our exact spacebar formatting */
	               }
	               .clickable-cmd {
	                   color: #00bba9; /* --- THE FIX: Forces the resting state back to green --- */
	                   cursor: pointer; /* Turns the mouse into a pointing hand */
	                   transition: all 0.2s ease-in-out;
	               }

	               /* 1. Prepares the cursor to be moved */
	               .rpg-cursor {
	                   display: inline-block; /* REQUIRED for the transform animation to work! */
	               }

	               /* 2. When hovering the command, trigger the animation ONLY on the cursor */
	               .clickable-cmd:hover .rpg-cursor {
	                   animation: rpgSlide 0.6s infinite;
	               }

	               /* 3. Your custom animation! */
	               @keyframes rpgSlide {
	                   0%   { transform: translateX(0px); }
	                   50%  { transform: translateX(5px); } /* Adjust to 6px if you want a wider jump! */
	                   100% { transform: translateX(0px); }
	               }
