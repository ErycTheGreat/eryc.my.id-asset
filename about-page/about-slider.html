	   * {

	   body {
	   width: 100%;
	   height: 100vh;
	   display: flex;
	   align-items: center;
	   justify-content: center;
	   position: relative; /* Required for pseudo-element positioning */
	   overflow: hidden;
	   }

	   body::before {
	   content: '';
	   position: absolute;
	   top: 10%; /* Start 5% from the top */
	   left: 0;
	   width: 100%;
	   height: 80%; /* Cover 80% of the height */
	   background: linear-gradient(90deg, #050522 21px, transparent 1%) center,
	   linear-gradient(#050522 21px, transparent 1%) center,
	   #aaa;
	   background-size: 22px 22px;
	   z-index: -1; /* Place it behind the content */
	   }

	   /* Add this new pseudo-element for the corner squares */
	   body::after {
	   content: '';
	   position: absolute;
	   top: 10%;
	   left: 0;
	   width: 100%;
	   height: 80%;
	   pointer-events: none;
	   z-index: 1; /* Ensure it's above the grid background */
	   }

	   /* Corner squares */
	   body::after {
	   content: '';
	   position: absolute;
	   top: 10%; /* Match the grid background */
	   left: 1px;
	   width: 100%;
	   height: 80%; /* Match the grid background */
	   pointer-events: none;
	   z-index: 1;
	   background:
	   /* Top-left corner - positioned 10px from left and 10px from top */
	   linear-gradient(to bottom, #f1f5f9 2px, transparent 2px) 15px 10px,
	   linear-gradient(to right, #f1f5f9 2px, transparent 2px) 15px 10px,

	   /* Top-right corner - positioned 10px from right and 10px from top */
	   linear-gradient(to bottom, #f1f5f9 2px, transparent 2px) calc(100% - 18px) 10px,
	   linear-gradient(to left, #f1f5f9 2px, transparent 2px) calc(100% - 18px) 10px,

	   /* Bottom-left corner - positioned 10px from left and 10px from bottom */
	   linear-gradient(to top, #f1f5f9 2px, transparent 2px) 15px calc(100% - 10px),
	   linear-gradient(to right, #f1f5f9 2px, transparent 2px) 15px calc(100% - 10px),

	   /* Bottom-right corner - positioned 10px from right and 10px from bottom */
	   linear-gradient(to top, #f1f5f9 2px, transparent 2px) calc(100% - 18px) calc(100% - 10px),
	   linear-gradient(to left, #f1f5f9 2px, transparent 2px) calc(100% - 18px) calc(100% - 10px);

	   background-size:
	   46px 46px, /* Double the offset to center properly */
	   46px 46px,
	   46px 46px,
	   46px 46px,
	   46px 46px,
	   46px 46px,
	   46px 46px,
	   46px 46px;

	   background-repeat: no-repeat;
	   }

	   .wrapper {
	   display: grid;
	   grid-template-columns: repeat(12, 1fr);
	   width: 100%;
	   height: 100vh;
	   align-items: center;
	   justify-content: center;
	   padding: 20px;
	   }
	   .text-container {
	   grid-column: span 3;
	   display: flex;
	   flex-direction: column;
	   align-items: center;
	   text-align: center;
	   }
	   .title {
	   display: flex;
	   align-items: center;
	   justify-content: center;
	   font-size: 2rem;
	   }
	   
	  .text {

		}

	   .custom-paragraph {

	   margin-top: 20px;

	   }
	   .slider {
	   grid-column: span 9;
	   display: flex;
	   align-items: center;
	   justify-content: flex-start;
	   overflow: hidden;
	   height: 80vh;
	   }
	   .slide-track {

	   }
	   .slide {
	   width: 33vw;
	   height: 25vh;
	   display: flex;
	   align-items: center;
	   justify-content: center;
	   }
	   .slide img {
	   width: 60%;

	   }
	   @media (max-width: 480px) {

	   body::before {

	   left: 0;
	   height: 100%; /* Cover 80% of the height */

	   /* Top-left corner - positioned 10px from left and 10px from top */

	   /* Top-right corner - positioned 10px from right and 10px from top */
	   linear-gradient(to bottom, #cbd5e1 2px, transparent 2px) calc(100% - 12px) 10px,
	   linear-gradient(to left, #cbd5e1 2px, transparent 2px) calc(100% - 12px) 10px,

	   /* Bottom-left corner - positioned 10px from left and 10px from bottom */
	   linear-gradient(to top, #cbd5e1 2px, transparent 2px) 9px calc(100% - 10px),
	   linear-gradient(to right, #cbd5e1 2px, transparent 2px) 9px calc(100% - 10px),

	   /* Bottom-right corner - positioned 10px from right and 10px from bottom */
	   linear-gradient(to top, #cbd5e1 2px, transparent 2px) calc(100% - 12px) calc(100% - 10px),
	   linear-gradient(to left, #cbd5e1 2px, transparent 2px) calc(100% - 12px) calc(100% - 10px);

	   background-size:
	   23px 23px, /* Double the offset to center properly */
	   23px 23px,
	   23px 23px,
	   23px 23px,
	   23px 23px,
	   23px 23px,
	   23px 23px,
	   23px 23px;

	   background-repeat: no-repeat;
	   }
