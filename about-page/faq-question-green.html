    <style>
	@font-face {
    font-family: 'JetBrains Mono Local';
    font-style: normal;
    font-weight: 400; /* Matches your 600 weight */
    font-display: swap; 
    /* 2. Point this to your actual GitHub Pages URL */
    src: url('https://www.eryc.my.id/assets/font/jetbrains-mono-400.woff2') format('woff2');
    }
    body {
        font-family: 'JetBrains Mono Local',  monospace;
        background-color: transparent;
        color: #cbd5e1;
        text-align: center;
        padding: 0;
        margin: 0;
        display: flex;
        align-items: flex-start;
        min-height: 100vh;
        overflow: hidden;
        flex-direction: column;
    }

    .dialog-box {
        width: 100%;
        padding: 5px;
        background-color: transparent;
        border: none;
        text-align: left;
        display: flex;
        align-items: center;
    }

    .avatar-container {
        width: 10%;
        display: flex;
        align-items: center;
        margin-right: 5px;
    }

    .avatar {
        width: 80%;
        height: auto;
        border-radius: 50%;
    }

    .options-container {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
    }

    .options-header {
        font-size: 3vw;
        color: #cbd5e1;
        font-weight: normal;
        letter-spacing: 2px;
    }

    .text-box {
        width: calc(100% - 15%); /* Account for left margin and border */
        background-color: transparent;
		border: 1px solid #00bba9;
		border-radius:6px 0px 0px 6px;
        padding: 0px;
        margin-top: -10px; /* Move the text box up by 10 pixels */
        box-sizing: border-box;
        margin-left: 11%; /* Add left margin to the text box */
		margin-right: 4%;
        font-size: 3vw;
        display: flex; /* Use flexbox for dividing the text box */
        flex-direction: row; /* Arrange in a row (left and right) */
		position: relative; /* Required for ::after positioning */
    }
	
	.text-box::before	 {
				content: "";
				position: absolute;
				top: -6px; /* Exactly 1px above the dialog box */
				left: 1px;
				width: 100%; /* Same width as the dialog box */
				height: 5px; /* Adjust height to fit clip-path shape */
				background: #00bba9; /* Adjust color as needed */
				clip-path: polygon( 30% 100%, 100% 100%, calc(100% - 6px) 0, 80% 0, calc(80% - 6px) 100%, 30% 100%);
				pointer-events: none; /* Prevents interference */
			}
	
	.text-box::after	 {
			content: "";
			position: absolute;
			bottom: -6px; /* Exactly 1px above the dialog box */
			left: 1px;
			width: 100%; /* Same width as the dialog box */
			height: 5px; /* Adjust height to fit clip-path shape */
			background: #00bba9; /* Adjust color as needed */
			clip-path: polygon(0 0, 0 50%, 10% 50%, 10% 0, 30% 0, 30% 100%, 40% 100%, 40% 0, 70% 0, 70% 50%, 80% 50%, 80% 100%, 90% 100%, calc(100% - 6px) 100%, 100% 0);
			pointer-events: none; /* Prevents interference */
		}

    .text-box .left-side {
        flex: 0 0 auto; /* Let the left side take the minimum required space */
        width: auto; /* Set the width to auto to match the content */
        padding-right: 10px; /* Add some spacing between left and right */
		padding-left: 10px;
        font-weight: 300; /* Make the left side bold */
		color: #00bba9;
		background-color:#091427;
		border-radius: 6px;
		align-items: center; /* Center the text vertically */
        justify-content: center; /* Center the text horizontally */
		margin: 5px;
		letter-spacing: 2px;
    }

    .text-box .right-side {
        flex: 1; /* Allow the right side to fill the remaining space */
		text-align: left; /* Justify the text in the right side */
		margin: 5px;
		color: #cbd5e1;
		font-weight: 300;
		font-size: 3vw;
		letter-spacing: 1px;
		
		text-shadow:1px 1px 2px rgba(0,0,0,0.95);
		filter:brightness(1);
		text-rendering:optimizeLegibility;
    }

    @media screen and (max-width: 480px) {
        .options-header {
            font-size: 2.5vw;
        }

        .avatar {
            width: 80%;
            height: auto;
            border-radius: 50%;
        }
    }
