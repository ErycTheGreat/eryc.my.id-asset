<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="googlebot" content="noindex,indexifembedded" />
    <title>About Me | Eryc Tri Juni S - Digital Marketing Specialist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preload" href="https://www.eryc.my.id/assets/font/jetbrains-mono-600.woff2" as="font" type="font/woff2" crossorigin>
	<link href="styles/main.css" rel="stylesheet">
    <style>
    
        /* Define your custom local font */
        @font-face {
            font-family: 'JetBrains Mono Local';
            font-style: normal;
            font-weight: 600; /* Matches your 600 weight */
            font-display: swap; 
            /* 2. Point this to your actual GitHub Pages URL */
            src: url('https://www.eryc.my.id/assets/font/jetbrains-mono-600.woff2') format('woff2');
        }
        
      html, body {
            margin: 0;
            padding: 0;
            height: 100%; /* MUST be 100% so the container reaches the floor */
            overflow: hidden; 
        }

        /* --- DESKTOP SETTINGS --- */
        .container {
            width: 100%;
            height: 90%; 
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Glues the text to the absolute bottom edge */
            
            /* 🚨 THE MAGIC NUDGE 🚨 */
            /* This visually pushes the text down further. Increase this number (e.g., 25px, 30px) to close the gap more! */
            transform: translateY(5px); 
        }
        .title {
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-size: 2rem;
            overflow: hidden;
        }

        .fa {
            font-size: 2.6rem;
            color: #00bba9;
            margin-right: 30px;
			/* 🚨 THE ICON ALIGNMENT FIX 🚨 */
            /* Nudges the icon UP so it sits perfectly level with the text. Adjust 1-2px if needed. */
            transform: translateY(-4px);
			
        }

        .text {
            font-family: 'JetBrains Mono local', monospace;
            font-size: 2.8rem;
            font-weight: 600;
            color: #f1f5f9;
            margin: 0;
            padding: 0;
            line-height: 1; /* Added to crush the font bounding box */
        }

        .icon-text {
            display: flex;
            align-items: center;
        }

        @media (max-width: 480px) {
            .container {
                height: fit-content; 
                align-items: center; 
                transform: translateY(0); /* Resets the nudge so mobile stays perfect */
            }
			
			.title {
                flex-direction: column;
                font-size: 2.2rem;
                overflow: hidden;
            }

            .fa {
                font-size: 1.9rem;
                margin-right: 20px;
                transform: translateY(-2px); /* A smaller nudge for the smaller mobile size */
            }

            .text {
                font-size: 2.1rem;
            }
        }

        /* Blinking cursor effect */
        .blinking-cursor {
            display: inline-block;
            width: 24px;
            height: 0.14em;
            background-color: #f1f5f9;
            animation: blink 1s infinite;
            vertical-align: text-bottom;            
        }

        @keyframes blink {
            0%, 50% {
                opacity: 1;
            }
            50.1%, 100% {
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <div class="icon-text">
                <svg class="fa" viewBox="0 0 512 512" fill="currentColor" width="1em" height="1em" xmlns="http://www.w3.org/2000/svg">

                            <rect width="512" height="512" fill="white" />
                            
                                    <g transform="translate(-153.6, -180) scale(1.6)">

                                    </g>
                                    <g transform="translate(-153.6, -140) scale(1.6)">
                                    <path d="M232 128 h48 v48 h-48 z" fill="black" />
                                </g>
                            </mask>
                    </defs>
                    <circle cx="256" cy="256" r="256" mask="url(#info-mask)" />
                </svg>
                <h1 class="text" itemprop="headline">Λbout me<span class="blinking-cursor"></span></h1>
            </div>
        </div>
    </div>
    <noscript>
        <p style="text-align: center; font-size: 1.5rem; color: #333; margin-top: 20px;">This is a brief description about myself. Feel free to explore more about my services.</p>
    </noscript>
</body>
</html>
