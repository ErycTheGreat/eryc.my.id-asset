					/* 3. The Upgraded Character-Break Keyframes */
	@keyframes watchdog-glitch-v2 {
		/* 0% to 45%: Perfect stability as the arrow approaches */
		0%, 45% {
			/*text-shadow:  							0 0 0.035em #f1f5f9,
													0 0 0.15em #f1f5f9,
													0 0 0.5em rgba(0,255,255,0.75),
													0 0 0.9em rgba(0,255,255,0.55);*/
			transform: translate(0, 0) skewX(0deg) scale(1);
			color: inherit;
			filter: blur(0px);
		}

		/* 48%: The Pre-Shock jitter */
		48% {
			text-shadow: 2px 0 0px #00fcf4, -2px 0 0px #ff0055;
			transform: translate(-1px, 0) skewX(-5deg) scale(1);
		}

		/* 50%: IMPACT! 
		   - Characters are squashed to half-height (scaleY 0.5) and violently skewed.
		   - Blinding white electrical flash (color & massive white shadow).
		   - Blur added to simulate signal loss. */
		50% {
			text-shadow: 5px 0 0px #00fcf4, -5px 0 0px #ff0055, 0 0 20px #ffffff;
			transform: translate(-4px, 2px) skewX(-30deg) scaleY(0.5) scaleX(1.1);
			color: #ffffff; 
			filter: blur(1px); 
		}

		/* 52%: REBOUND! 
		   - Characters over-correct and stretch too tall (scaleY 1.3).
		   - Colors invert and split aggressively the other direction. */
		52% {
			text-shadow: -6px 0 0px #00fcf4, 6px 0 0px #ff0055;
			transform: translate(4px, -1px) skewX(20deg) scaleY(1.3) scaleX(0.9);
			color: #00fcf4; /* Flashes bright cyan before settling */
			filter: blur(0px);
		}

		/* 55%: Stabilizing... */
		55% {
			text-shadow: -2px 0 0px #00fcf4, 2px 0 0px #ff0055;
			transform: translate(-1px, 0) skewX(-5deg) scale(1);
			color: inherit;
		}

		/* 60% to 100%: Instantly locked back to normal */
		60%, 100% {
			text-shadow: 0 0 10px #00bba9;
			transform: translate(0, 0) skewX(0deg) scale(1);
			color: inherit;
			filter: blur(0px);
		}
	}
