        /* =========================================
	   NEW SVG BORDER STYLES
	   ========================================= */
	.inner-glow-border {
    position: absolute;
    width: 94%;  /* Matches the inner div exactly */
    height: 94%; /* Matches the inner div exactly */
    
    /* This perfectly centers the border directly over your photo */
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    
    z-index: 3; /* top layer */
    pointer-events: none; /* Lets you click through it */
    overflow: visible; /* Prevents the glow from being chopped off */
}

.inner-glow-border polygon {
    fill: none; 
    
    /* THE MAGIC FIX: This links directly to the SVG gradient ID we just made */
    stroke: url(#cyber-gradient); 
    
    stroke-width: 0.8; 
    
    /* Keep the neon glow as a solid bright color so the shadow doesn't get muddy */
    filter: drop-shadow(0 0 3px #4386c3); 
	z-index:3;    /* top layer */
}

.gap-fill {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1; /* behind avatar */ /* Keeps it strictly behind your inner border line */
    pointer-events: none; /* Ensures you can still click the avatar */
}

				opacity 0.4s ease,

		}

		.avatar.loaded{

		}

											-webkit-text-fill-color: transparent;

											/* refined neon core */
											text-shadow:
												0 0 0.035em #ffffff,
												0 0 0.15em #ffffff,

											animation: crtFlicker 0.035s infinite;	
        }
		
		@keyframes crtFlicker {
												0%   { opacity: 1; }
												10%  { opacity: 0.85; }
												20%  { opacity: 1; }
												30%  { opacity: 0.78; }
												40%  { opacity: 0.95; }
												55%  { opacity: 0.82; }
												70%  { opacity: 1; }
												85%  { opacity: 0.88; }
												100% { opacity: 1; }
										  }
					.options-header::after {
												content: "";
												position: absolute;
												inset: 0;
												pointer-events: none;
												z-index:2;
												background: repeating-linear-gradient(
													to bottom,
													rgba(4,18,45,0.6) 0px,
													rgba(4,18,45,0.6) 1px,
													transparent 1px,
													transparent 2px
												);

												mix-blend-mode: multiply;
												opacity: 0.45;
												
											}

        .option {
            font-family: 'White Rabbit Local', sans-serif;

			text-align: left;
			
			animation: watchdog-glitch-v2 0.75s infinite linear;
        }
		
		@keyframes watchdog-glitch-v2 {
    /* 0% to 45%: Perfect stability as the arrow approaches */
    0%, 45% {
        /*text-shadow:  							0 0 0.035em #f1f5f9,
												0 0 0.15em #f1f5f9,
												0 0 0.5em rgba(0,255,255,0.75),
												0 0 0.9em rgba(0,255,255,0.55);*/
        transform: translate(0, 0) skewX(0deg) scale(1);
        color: inherit;
        filter: blur(0px);
    }

    /* 48%: The Pre-Shock jitter */
    48% {
        text-shadow: 2px 0 0px #00fcf4, -2px 0 0px #ff0055;
        transform: translate(-1px, 0) skewX(-5deg) scale(1);
    }

    /* 50%: IMPACT! 
       - Characters are squashed to half-height (scaleY 0.5) and violently skewed.
       - Blinding white electrical flash (color & massive white shadow).
       - Blur added to simulate signal loss. */
    50% {
        text-shadow: 5px 0 0px #00fcf4, -5px 0 0px #ff0055, 0 0 20px #ffffff;
        transform: translate(-4px, 2px) skewX(-30deg) scaleY(0.5) scaleX(1.1);
        color: #ffffff; 
        filter: blur(1px); 
    }

    /* 52%: REBOUND! 
       - Characters over-correct and stretch too tall (scaleY 1.3).
       - Colors invert and split aggressively the other direction. */
    52% {
        text-shadow: -6px 0 0px #00fcf4, 6px 0 0px #ff0055;
        transform: translate(4px, -1px) skewX(20deg) scaleY(1.3) scaleX(0.9);
        color: #00fcf4; /* Flashes bright cyan before settling */
        filter: blur(0px);
    }

    /* 55%: Stabilizing... */
    55% {
        text-shadow: -2px 0 0px #00fcf4, 2px 0 0px #ff0055;
        transform: translate(-1px, 0) skewX(-5deg) scale(1);
        color: inherit;
    }

    /* 60% to 100%: Instantly locked back to normal */
    60%, 100% {
        text-shadow: 0 0 10px #00bba9;
        transform: translate(0, 0) skewX(0deg) scale(1);
        color: inherit;
        filter: blur(0px);
    }
}
