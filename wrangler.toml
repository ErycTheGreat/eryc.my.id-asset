name = "homepage-sitemap-robots-txt"
main = "index.js"
compatibility_date = "2024-03-27"

# This locks in your routes so GitHub never overwrites them
routes = [
  { pattern = "www.eryc.my.id/*", zone_name = "eryc.my.id" },
  { pattern = "eryc.my.id/*", zone_name = "eryc.my.id" },
  { pattern = "www.eryc.my.id/assets/*", zone_name = "eryc.my.id" }
]

# --- AI BOT TRACKING LOGS ---
[observability]
[observability.logs]
enabled = true
# Set this to false so your logs don't get spammed with every single normal user visit. 
# It will ONLY log when your specific console.log() is triggered by an AI bot.
invocation_logs = false
